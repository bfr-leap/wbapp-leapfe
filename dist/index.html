<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <!-- Load d3.js -->
    <script src="https://d3js.org/d3.v4.js"></script>

    <title>Getting Started</title>
    <style>
        body {
            background-color: rgb(50, 54, 57);
            font-family: Lato;
            font-size: 9pt;
            color: #ddd;
        }

        div {
            margin-left: 1em;
            margin-right: 1em;
        }

        .toolbar {
            background: #3498db;
            list-style-type: none;
            margin: 0;
            padding: 0.3em;
            height: 2.2em;
            overflow: hidden;
        }

        .toolbar li {
            display: inline-block;
            height: 2em;

        }

        .toolbar li a {
            border-radius: 1.25em;
            display: inline-block;
            color: #000;
            height: 1.25em;
            padding: .5em .75em;
            text-decoration: none;
        }

        .toolbar li a:hover {

            background-color: rgb(100, 108, 114);
            color: white;
        }

        .toolbar li a span {
            display: table-cell;

            height: 1.25em;
        }

        .toolbar li a span::before {
            content: "\00a0";
        }

        .toolbar li a .jira-ico,
        .toolbar li a .splunk-ico,
        .toolbar li a .svgedit-ico,
        .toolbar li a .github-ico,
        .toolbar li a .grafana-ico,
        .toolbar li a .wp-ico,
        .toolbar li a .bb-ico {
            width: 1.25em;
            height: 1.25em;
            display: table-cell;
            vertical-align: baseline;
        }

        .card-container {
            margin-top: 1em;
            margin-left: auto;
            margin-right: auto;
            max-width: 200em;
            display: grid;
            grid-template-columns: auto;
            grid-gap: 1em;
        }

        .card-item {
            background-color: #222;
            padding: 1em;
            text-align: center;
        }

        .linkbtn-container {
            margin-top: 1em;
            margin-left: auto;
            margin-right: auto;
            max-width: 80em;
            display: grid;
            grid-template-columns: auto auto auto auto auto auto;
            grid-gap: 1em;
        }

        .linkbtn-item {
            padding: .25em;
            text-align: center;
        }

        .linkbtn-item a .jira-ico,
        .linkbtn-item a .splunk-ico,
        .linkbtn-item a .svgedit-ico,
        .linkbtn-item a .github-ico,
        .linkbtn-item a .grafana-ico,
        .linkbtn-item a .wp-ico,
        .linkbtn-item a .bb-ico {
            margin-left: auto;
            margin-right: auto;

            width: 4em;
            height: 4em;
        }

        .linkbtn-fullrow {
            grid-column-start: 1;
            grid-column-end: 7;
            text-align: left;
            font-size: 12pt;
        }

        .linkbtn-item a {
            border-radius: 1.25em;
            display: block;
            color: #000;
            width: 100%;
            height: 100%;
            padding: 1em 0em;
            text-decoration: none;
        }

        .linkbtn-item a:hover {
            background-color: rgb(100, 108, 114);
            color: white;
        }

        .linkbtn-item a span {
            display: block;
            padding-top: 0.5em;
        }

        .chart-container {
            height: 75em;
            background-color: rgb(50, 54, 57);
            background-image: url('./blue-frog-racing.png');
            background-size:     cover;                      /* <------ */
            background-repeat:   no-repeat;
            background-position: center center;  
        }

        .chart {
            width: 100%;
            height: 100%;
        }

        .driver-name {
            cursor: default;
            padding: 0em 1em;
            display: inline-block;
        }

        .driver-name .swatch {
            display: inline-block;
            height: 0.7em;
            width: 0.8em;
            background-color: rgb(50, 54, 57);
        }

        .driver-name .text {
            padding: 0em 0.2em;
        }

        .driver-name:hover {
            background-color: rgb(100, 108, 114);
            color: white;
        }

        
    </style>
</head>

<body>
    <script src="main.js"></script>

    <ul class="toolbar">

    </ul>

    <div id="cards" class="card-container">
        <div class='card-item' id="name-cards">
            <div class='chart-container' id="sizerDiv" style="height: 0em">
            </div>
        </div>
    </div>

    <div id="cards" class="card-container">

        <div class='card-item'>
            <div class='linkbtn-item linkbtn-fullrow'><span id="sessionNameStr"></span> | Cumulatuve Delta | Baseline <span id="baselineStr"></span>
            </div>
            <div class='chart-container' id="my_dataviz">
                <!-- <canvas id='chart' class='chart'></canvas> -->
            </div>
        </div>

    </div>

   


</body>

</html>
